<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gruesome Wizard's Chess</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♟</text></svg>">
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div class="app">
      <header class="top-bar">
        <div class="top-bar-title">
          <p class="eyebrow">Blood. Bone. Strategy.</p>
          <h1>Gruesome Wizard's Chess</h1>
        </div>
        <div class="top-bar-hud">
          <div><span>Turn</span><strong id="turnLabel">White</strong></div>
          <div><span>Status</span><strong id="statusLabel">Choose a piece</strong></div>
          <div><span>Last kill</span><strong id="killLabel">None yet</strong></div>
          <div class="hud-spells">
            <div><span>White spell</span><strong id="whiteSpellLabel">Meteor ready</strong></div>
            <div><span>Black spell</span><strong id="blackSpellLabel">Meteor ready</strong></div>
          </div>
          <button id="restartBtn">Resurrect the board</button>
        </div>
      </header>

      <main class="game-layout">
        <section class="board-panel">
          <div class="board-frame">
            <div id="board" class="board" aria-label="Wizard chess board"></div>
          </div>
        </section>
        <aside class="lore-panel">
          <h2>Necromancer's Commentary</h2>
          <ul id="log"></ul>
        </aside>
      </main>
    </div>
  </body>
</html>
